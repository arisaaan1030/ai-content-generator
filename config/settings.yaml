# ═══════════════════════════════════════════════════════
# AI Content Generator ── 全体設定
# ═══════════════════════════════════════════════════════

# ─── API設定 ───
api:
  # プロバイダー: "anthropic" または "openai"
  provider: "anthropic"

  # 使用するモデル名
  # Anthropic: "claude-sonnet-4-20250514", "claude-haiku-4-5-20251001"
  # OpenAI:    "gpt-4o", "gpt-4o-mini"
  model: "claude-sonnet-4-20250514"

  # コードレビュー用モデル（軽量モデル推奨）
  # Anthropic: "claude-haiku-4-5-20251001"
  # OpenAI:    "gpt-4o-mini"
  review_model: "claude-haiku-4-5-20251001"

  # 最大生成トークン数
  max_tokens: 4096
  # 創造性パラメータ（0.0=確定的、1.0=創造的）
  temperature: 0.85

  # Batch API を使用して50%コスト削減（Anthropicのみ対応）
  # OpenAI使用時は自動的に無効になります
  use_batch_api: true
  # Batch完了待ちの最大時間（秒）
  batch_poll_timeout: 1800    # 30分
  # Batch状態確認の間隔（秒）
  batch_poll_interval: 30     # 30秒ごとにチェック

# ─── セルフレビュー設定 ───
# 生成されたコンテンツを自動レビュー（コスト増加のため デフォルト無効）
review:
  enabled: false

# ─── リトライ設定 ───
# API呼び出し失敗時の自動リトライ
retry:
  max_retries: 3
  backoff_factor: 2           # 1s → 2s → 4s
  retry_on_status: [429, 500, 502, 503, 529]

# ─── 品質基準 ───
quality:
  x_post:
    min_chars: 140
    max_chars: 280
    max_hashtags: 2
  note_article:
    min_chars: 1500
    max_chars: 3000

# ─── note.com 下書き自動作成 ───
# note.comの非公式APIを使って記事の下書きを自動作成します。
# 最終的な公開はブラウザから手動で行ってください。
#
# セットアップ:
#   1. ブラウザでnote.comにログイン
#   2. DevTools → Application → Cookies から _note_session_v5 の値をコピー
#   3. 環境変数 NOTE_SESSION_COOKIE に設定
#   4. enabled を true に変更
note_client:
  enabled: false
  request_delay: 1.0              # API呼び出し間の待機秒数（礼儀的な遅延）

# ─── 投稿履歴管理 ───
history:
  file_path: "data/post_history.json"
  keep_days: 30
  recent_days: 7

# ─── GitHub Issue設定 ───
issue:
  title_template: "📝 投稿案 ── {date}（{theme}）"
  labels:
    - "generated"
    - "content"

# ─── スケジュール（参考用） ───
schedule:
  cron: "0 21 * * *"          # UTC 21:00 = JST 06:00
  timezone: "Asia/Tokyo"
